<!DOCTYPE html>
<html>
<head>
    <title>Tugas 6 - K-Means</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <h2>Input Data Provinsi Baru</h2>
    <form method="POST" class="row g-3 mb-4">
        <div class="col-md-4"><input type="text" name="provinsi" class="form-control" placeholder="Nama Provinsi" required></div>
        <div class="col-md-3"><input type="number" name="upah" class="form-control" placeholder="Upah Minimum" required></div>
        <div class="col-md-3"><input type="number" name="gk" class="form-control" placeholder="Garis Kemiskinan" required></div>
        <div class="col-md-2"><button type="submit" class="btn btn-primary w-100">Tambah & Cluster</button></div>
    </form>

    <hr>
    <div class="row">
        <div class="col-md-7">
            <h4>Tabel Hasil Clustering</h4>
            <table class="table table-sm table-bordered">
                <thead class="table-dark">
                    <tr><th>Provinsi</th><th>Upah</th><th>Garis Kemiskinan</th><th>Cluster</th></tr>
                </thead>
                <tbody>
                    {% for row in data %}
                    <tr>
                        <td>{{ row.provinsi }}</td>
                        <td>{{ row.min_upah }}</td>
                        <td>{{ row.gk }}</td>
                        <td><span class="badge bg-info text-dark">Cluster {{ row.cluster }}</span></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        <div class="col-md-5 text-center">
            <h4>Visualisasi</h4>
            <img src="data:image/png;base64,{{ plot_url }}" class="img-fluid border">
        </div>
    </div>
</body>
</html>
